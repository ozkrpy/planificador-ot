{% extends "base.html" %}

{% block main %}
<div class="container-fluid">
    <div class="row">
        <div class="col-md-5 col-lg-4"> 
            <div class="card shadow-sm mb-4">
                <div class="card-header">
                    {{ txt.HOME }}
                </div>
                <div class="card-body">
                    <h5 class="text-secondary">Welcome, {{ current_user.username }}</h5>
                    <p class="text-muted small">System status and overview.</p>
                    
                    <div class="card border-left-primary shadow-sm h-100 py-2">
                        <div class="card-body">
                            <div class="row no-gutters align-items-center">
                                <div class="col mr-2">
                                    <div class="text-xs font-weight-bold text-muted text-uppercase mb-1">
                                        Status</div>
                                    <div class="h6 mb-0 font-weight-bold text-dark">Database Active</div>
                                </div>
                                <div class="col-auto">
                                    <i class="fa fa-database fa-lg text-secondary"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
