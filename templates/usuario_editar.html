{% extends "base.html" %}

{% block main %}
<div class="container-fluid">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-light d-flex align-items-center">
                    <i class="fa fa-pencil mr-2 text-secondary"></i>
                    <h5 class="mb-0 text-dark">{{ txt.MODIFICAR_TITULO }}</h5>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <div class="form-group">
                            <label class="x-small font-weight-bold text-secondary">{{ txt.TABLA_USUARIO }}</label>
                            <input type="text" name="username" value="{{ u.username }}" class="form-control form-control-sm" required>
                        </div>
                        <div class="form-group">
                            <label class="x-small font-weight-bold text-secondary">Nueva Password</label>
                            <input type="password" name="password" class="form-control form-control-sm">
                            <small class="form-text text-muted" style="font-size: 0.65rem;">{{ txt.MODIFICAR_INFO }}</small>
                        </div>
                        <div class="d-flex justify-content-between mt-4">
                            <a href="{{ url_for('parametrico') }}" class="btn btn-sm btn-outline-secondary">Cancelar</a>
                            <button type="submit" class="btn btn-dark btn-sm">
                                <i class="fa fa-save"></i> Guardar Cambios
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
